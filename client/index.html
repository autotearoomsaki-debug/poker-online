<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Online</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
      }
      @keyframes cardDeal {
        from { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-15deg); }
        to   { opacity: 1; transform: translate(-50%,-50%) scale(1)   rotate(0deg); }
      }
      @keyframes cardFlip {
        0%   { opacity: 0; transform: rotateY(90deg) scale(0.8); }
        100% { opacity: 1; transform: rotateY(0deg)  scale(1); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      @keyframes winGlow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
        50%       { box-shadow: 0 0 20px 4px rgba(240,192,64,0.6); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
