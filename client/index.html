<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Online</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', sans-serif;
        background: #060e06;
        color: #eee;
        min-height: 100vh;
      }
      @keyframes cardDeal {
        from { opacity: 0; transform: translate(-50%,-50%) scale(0.4) rotate(-15deg); }
        to   { opacity: 1; transform: translate(-50%,-50%) scale(1)   rotate(0deg); }
      }
      @keyframes cardFlip {
        0%   { opacity: 0; transform: rotateY(90deg) scale(0.8); }
        100% { opacity: 1; transform: rotateY(0deg)  scale(1); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      @keyframes winGlow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
        50%       { box-shadow: 0 0 20px 4px rgba(240,192,64,0.6); }
      }
      @keyframes confettiFall {
        0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
      }
      @keyframes celebrationIn {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes trophyBounce {
        0%, 100% { transform: translateY(0) scale(1); }
        40%      { transform: translateY(-16px) scale(1.15); }
        60%      { transform: translateY(-8px)  scale(1.05); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes avatarPulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 12px currentColor; }
        50%       { opacity: 0.7; box-shadow: 0 0 24px currentColor; }
      }
      @keyframes allInZoom {
        0%   { opacity: 0; transform: scale(0.3) rotate(-8deg); }
        20%  { opacity: 1; transform: scale(1.2) rotate(2deg); }
        50%  { opacity: 1; transform: scale(1.05) rotate(0deg); }
        80%  { opacity: 1; transform: scale(1) rotate(0deg); }
        100% { opacity: 0; transform: scale(1.1) rotate(0deg); }
      }
      @keyframes chipRain {
        0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(80px)  rotate(540deg); opacity: 0; }
      }
      @keyframes flopCard {
        0%   { opacity: 0; transform: translateY(-40px) rotateY(90deg) scale(0.6); }
        60%  { opacity: 1; transform: translateY(4px)   rotateY(-8deg) scale(1.05); }
        100% { opacity: 1; transform: translateY(0)     rotateY(0deg)  scale(1); }
      }
      @keyframes actionBadge {
        0%   { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.8); }
        15%  { opacity: 1; transform: translateX(-50%) translateY(-3px) scale(1.06); }
        25%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
        70%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(0.95); }
      }
      @keyframes toastSlide {
        0%   { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.88); }
        18%  { opacity: 1; transform: translateX(-50%) translateY(-4px) scale(1.04); }
        30%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
        72%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-12px) scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
